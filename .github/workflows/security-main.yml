name: security-main
on:
  push: { branches: [main] }
  workflow_dispatch:
permissions: { contents: read, security-events: write }
jobs:
  main-scan-reimport:
    runs-on: [self-hosted, linux, x64, ci, runner-security]
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Scan (semgrep/gitleaks/trivy-fs → JSON)
        run: |
          mkdir -p scan-results
          python3 -m pip install --user --break-system-packages -q semgrep; export PATH="$HOME/.local/bin:$PATH"
          semgrep scan --config p/javascript --config p/security-audit --json --output scan-results/semgrep.json || true
          V=8.30.1; curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${V}/gitleaks_${V}_linux_x64.tar.gz" | tar -xz -C /tmp gitleaks
          /tmp/gitleaks detect --source . --report-format json --report-path scan-results/gitleaks.json --redact --exit-code 0
          TV=0.71.2; curl -sSL "https://github.com/aquasecurity/trivy/releases/download/v${TV}/trivy_${TV}_Linux-64bit.tar.gz" | tar -xz -C /tmp trivy
          /tmp/trivy fs --format json --output scan-results/trivy-fs.json --exit-code 0 .
          [ -f package-lock.json ] && npm audit --json > scan-results/npm-audit.json || true
      - name: Reimport to DefectDojo (close_old_findings)
        env: { DEFECTDOJO_URL: "${{ secrets.DEFECTDOJO_URL }}", DEFECTDOJO_TOKEN: "${{ secrets.DEFECTDOJO_TOKEN }}" }
        run: |
          R="${GITHUB_REPOSITORY##*/}"
          declare -A M=( [semgrep.json]="Semgrep JSON Report" [gitleaks.json]="Gitleaks Scan" [trivy-fs.json]="Trivy Scan" [npm-audit.json]="NPM Audit v7+ Scan" )
          for f in "${!M[@]}"; do
            [ -f "scan-results/$f" ] && bash .github/eln-scripts/reimport-scan.sh --repo "$R" --engagement continuous-main-scan \
              --scan-type "${M[$f]}" --file "scan-results/$f" --test-title "${M[$f]}" --close-old || true
          done
