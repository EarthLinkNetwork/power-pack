# dependabot.yml — グループ化+月次で PR を最小化 (PR が hosted CI を起動しないよう数を絞る)。
# Dependabot 自体は無料。コストは PR が起動する CI。よって PR を束ねて回数を減らす。
# security update (脆弱性検知時) は schedule と無関係に即時 PR される (これも無料 + 重要なので維持)。
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 2
    groups:
      npm-all:
        patterns: ["*"]
    labels: ["dependencies"]
    commit-message:
      prefix: "deps"
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 2
    groups:
      pip-all:
        patterns: ["*"]
    labels: ["dependencies", "python"]
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 1
    groups:
      docker-all:
        patterns: ["*"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 1
    groups:
      gha-all:
        patterns: ["*"]
    commit-message:
      prefix: "ci"
